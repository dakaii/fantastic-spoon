# Failover workflow — Level A notify + optional Level C activate-apps Cloud Function
# Templated by Terraform (templatefile). $${...} = Workflows expression.
main:
  params: [input]
  steps:
    - notifyFailoverStart:
        call: googleapis.pubsub.v1.projects.topics.publish
        args:
          topic: ${pubsub_topic}
          body:
            messages:
              - data: $${base64.encode(json.encode({"subject": "Failover Workflow Started", "message": "Failover triggered. Reason: " + input.reason}))}
        result: startNotify

    - veleroNote:
        assign:
          - restoreStatus: "velero_not_automated_see_hint"
        next: levelC

    - levelC:
%{ if enable_level_c ~}
        call: http.post
        args:
          url: ${activate_url}
          auth:
            type: OIDC
            audience: ${activate_url}
          timeout: 120
          headers:
            Content-Type: "application/json"
          body:
            reason: $${input.reason}
        result: activateResult
        next: assignLevelC
%{ else ~}
        assign:
          - levelCStatus: "disabled_run_failover_gcp_sh_activate_apps"
        next: notifyFailoverComplete
%{ endif ~}

%{ if enable_level_c ~}
    - assignLevelC:
        assign:
          - levelCStatus: $${activateResult.body}
        next: notifyFailoverComplete
%{ endif ~}

    - notifyFailoverComplete:
        call: googleapis.pubsub.v1.projects.topics.publish
        args:
          topic: ${pubsub_topic}
          body:
            messages:
              - data: $${base64.encode(json.encode({"subject": "${notify_subject}", "message": "${notify_message}"}))}
        next: done

    - done:
        return:
          status: complete
          velero: $${restoreStatus}
          level_c: $${levelCStatus}
