---
# Configure host WireGuard on VPN gateway VMs (additive; not part of site.yml).
#
# Usage:
#   ansible-playbook -i inventory/vpn-hosts.yml playbooks/vpn-gateway.yml
#
# Expects vars (from inventory and/or -e / vpn-clients/server.env):
#   wireguard_port, vpn_city, wg_server_private_key, wg_server_public_key,
#   wg_client_public_key, wg_server_address (e.g. 10.66.0.1/24),
#   wg_client_address (e.g. 10.66.0.2/32), wg_full_tunnel (bool)
- name: Configure WireGuard VPN gateways
  hosts: vpn_gateway
  become: true
  roles:
    - role: wireguard-node
