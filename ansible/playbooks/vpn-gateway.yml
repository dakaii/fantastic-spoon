---
# Configure host WireGuard on VPN gateway VMs (additive; not part of site.yml).
#
# Preferred (multi-peer):
#   ./scripts/vpn-apply-peers.sh us
#   # or: ./scripts/vpn-peer-add.sh us phone --apply
#
# Expects vars from vpn-apply-peers.sh / vpn-bootstrap.sh:
#   wg_server_private_key, wg_peers: [{name, public_key, address}, ...]
#   wireguard_port, vpn_city
#
# Legacy single-peer still works: wg_client_public_key + wg_client_address
- name: Configure WireGuard VPN gateways
  hosts: vpn_gateway
  become: true
  roles:
    - role: wireguard-node
