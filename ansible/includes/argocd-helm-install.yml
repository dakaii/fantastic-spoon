---
# Install Argo CD without blocking on Helm --wait (slow API on e2-micro standby).
# Clean up stuck releases between attempts so pending-install does not block retries.
- name: Initialize Argo CD Helm install state
  ansible.builtin.set_fact:
    argocd_helm_installed: false

- name: Install Argo CD chart with cleanup between attempts
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../includes/argocd-helm-install-attempt.yml"
  loop: "{{ range(1, 4) | list }}"
  loop_control:
    loop_var: attempt_num
  when: not argocd_helm_installed

- name: Fail if Argo CD Helm install did not succeed
  ansible.builtin.fail:
    msg: Argo CD Helm install failed after 3 attempts. Check for stuck helm secrets in argocd namespace.
  when: not argocd_helm_installed

- name: Wait for Argo CD server Ready
  ansible.builtin.command: >-
    k3s kubectl -n argocd wait --for=condition=Available
    deployment/argocd-server --timeout=600s
  register: argocd_server_ready
  until: argocd_server_ready.rc == 0
  retries: 3
  delay: 30
  changed_when: false
