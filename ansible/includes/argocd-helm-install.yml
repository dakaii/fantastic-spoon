---
# Install Argo CD without blocking on Helm --wait (slow API on e2-micro standby).
# Apply the chart, then poll deployments with kubectl retries.
- name: Install Argo CD chart (no Helm wait)
  kubernetes.core.helm:
    name: argocd
    chart_ref: argo/argo-cd
    release_namespace: argocd
    create_namespace: false
    values: "{{ argocd_helm_values }}"
    wait: false
  register: argocd_helm_install
  retries: 3
  delay: 45
  until: argocd_helm_install is succeeded

- name: Wait for Argo CD server Ready
  ansible.builtin.command: >-
    k3s kubectl -n argocd wait --for=condition=Available
    deployment/argocd-server --timeout=600s
  register: argocd_server_ready
  until: argocd_server_ready.rc == 0
  retries: 3
  delay: 30
  changed_when: false
