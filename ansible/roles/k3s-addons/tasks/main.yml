---
- name: Install Helm
  ansible.builtin.shell: |
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm

- name: Add Helm repos
  kubernetes.core.helm_repository:
    name: "{{ item.name }}"
    repo_url: "{{ item.url }}"
  loop:
    - { name: cilium, url: "https://helm.cilium.io/" }
    - { name: longhorn, url: "https://charts.longhorn.io" }
    - { name: traefik, url: "https://traefik.github.io/charts" }
    - { name: argo, url: "https://argoproj.github.io/argo-helm" }
    - { name: vmware-tanzu, url: "https://vmware-tanzu.github.io/helm-charts" }
    - { name: prometheus-community, url: "https://prometheus-community.github.io/helm-charts" }

- name: Wait for Kubernetes nodes Ready
  ansible.builtin.command: k3s kubectl wait --for=condition=Ready nodes --all --timeout=300s
  changed_when: false

- name: Install Cilium CNI
  kubernetes.core.helm:
    name: cilium
    chart_ref: cilium/cilium
    release_namespace: kube-system
    create_namespace: true
    values:
      kubeProxyReplacement: true
      k8sServiceHost: "{{ ansible_host }}"
      k8sServicePort: 6443
    wait: true
    wait_timeout: 10m0s

- name: Wait for Cilium pods Ready
  ansible.builtin.command: k3s kubectl -n kube-system wait --for=condition=Ready pod -l k8s-app=cilium --timeout=300s
  changed_when: false
  failed_when: false

- name: Install Longhorn storage
  kubernetes.core.helm:
    name: longhorn
    chart_ref: longhorn/longhorn
    release_namespace: longhorn-system
    create_namespace: true

- name: Install Traefik ingress
  kubernetes.core.helm:
    name: traefik
    chart_ref: traefik/traefik
    release_namespace: traefik
    create_namespace: true
    values:
      ports:
        web:
          nodePort: 30080
        websecure:
          nodePort: 30443

- name: Clean Argo CD hook jobs from prior failed runs
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
    kubectl delete jobs -n argocd \
      -l app.kubernetes.io/component=redis-secret-init \
      --ignore-not-found --wait=false || true
  args:
    executable: /bin/bash
  changed_when: false
  failed_when: false

- name: Clear stuck Argo CD Helm release from prior failed runs
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
    if helm status argocd -n argocd >/dev/null 2>&1; then
      status="$(helm status argocd -n argocd -o json | jq -r '.info.status')"
      case "$status" in
        pending-install|pending-upgrade|pending-rollback|failed)
          helm uninstall argocd -n argocd --wait --timeout 5m || true
          ;;
      esac
    fi
  args:
    executable: /bin/bash
  changed_when: false
  failed_when: false

- name: Check if Argo CD CRDs already exist
  ansible.builtin.command: k3s kubectl get crd applications.argoproj.io
  register: argocd_crds_exist
  changed_when: false
  failed_when: false

- name: Ensure Argo CD namespace and Redis secret exist
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
    kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
    if ! kubectl get secret argocd-redis -n argocd >/dev/null 2>&1; then
      kubectl create secret generic argocd-redis -n argocd \
        --from-literal=auth="$(openssl rand -base64 32)"
    fi
  args:
    executable: /bin/bash

- name: Build Argo CD Helm values
  ansible.builtin.set_fact:
    argocd_helm_values: >-
      {{
        lookup('file', playbook_dir + '/../../gitops/argocd/primary/values.yaml') | from_yaml
        | combine({'crds': {'install': argocd_crds_exist.rc != 0}}, recursive=True)
      }}

- name: Install Argo CD
  kubernetes.core.helm:
    name: argocd
    chart_ref: argo/argo-cd
    release_namespace: argocd
    create_namespace: true
    values: "{{ argocd_helm_values }}"
    wait: true
    wait_timeout: 15m0s

- name: Wait for Argo CD server Ready
  ansible.builtin.command: k3s kubectl -n argocd wait --for=condition=Available deployment/argocd-server --timeout=300s
  changed_when: false

- name: Install kube-prometheus-stack
  kubernetes.core.helm:
    name: kube-prometheus-stack
    chart_ref: prometheus-community/kube-prometheus-stack
    release_namespace: monitoring
    create_namespace: true
    values:
      grafana:
        adminPassword: changeme

- name: Install Velero (AWS S3)
  kubernetes.core.helm:
    name: velero
    chart_ref: vmware-tanzu/velero
    release_namespace: velero
    create_namespace: true
    values:
      configuration:
        backupStorageLocation:
          - name: default
            provider: aws
            bucket: "{{ velero_bucket | default('CHANGE_ME') }}"
            config:
              region: "{{ velero_region | default('us-east-1') }}"
      credentials:
        useSecret: true
        secretContents:
          cloud: |
            [default]
            aws_access_key_id={{ velero_access_key | default('CHANGE_ME') }}
            aws_secret_access_key={{ velero_secret_key | default('CHANGE_ME') }}
  when: velero_provider | default('aws') == 'aws'

- name: Install Velero (GCS via S3-compatible API)
  kubernetes.core.helm:
    name: velero
    chart_ref: vmware-tanzu/velero
    release_namespace: velero
    create_namespace: true
    values:
      configuration:
        backupStorageLocation:
          - name: default
            provider: aws
            bucket: "{{ velero_bucket }}"
            config:
              region: "{{ velero_region | default('auto') }}"
              s3ForcePathStyle: "true"
              s3Url: https://storage.googleapis.com
      credentials:
        useSecret: true
        secretContents:
          cloud: |
            [default]
            aws_access_key_id={{ velero_access_key }}
            aws_secret_access_key={{ velero_secret_key }}
  when:
    - velero_provider | default('aws') == 'gcp'
    - velero_bucket is defined
    - velero_bucket != ""
