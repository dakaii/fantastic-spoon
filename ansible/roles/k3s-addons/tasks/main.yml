---
- name: Configure Helm
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../includes/helm-prereqs.yml"
  vars:
    helm_repos:
      - { name: cilium, url: "https://helm.cilium.io/" }
      - { name: longhorn, url: "https://charts.longhorn.io" }
      - { name: traefik, url: "https://traefik.github.io/charts" }
      - { name: argo, url: "https://argoproj.github.io/argo-helm" }
      - { name: vmware-tanzu, url: "https://vmware-tanzu.github.io/helm-charts" }
      - { name: prometheus-community, url: "https://prometheus-community.github.io/helm-charts" }

- name: Wait for Kubernetes nodes Ready
  ansible.builtin.command: k3s kubectl wait --for=condition=Ready nodes --all --timeout=300s
  changed_when: false

- name: Reset broken Cilium release before install (e.g. after GCP IP change)
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
    if ! helm status cilium -n kube-system >/dev/null 2>&1; then
      exit 0
    fi

    need_reset=false
    status="$(helm status cilium -n kube-system -o json | jq -r '.info.status')"
    case "$status" in
      pending-install|pending-upgrade|pending-rollback|failed)
        need_reset=true
        ;;
    esac

    if [[ "$need_reset" != "true" ]]; then
      not_ready="$(kubectl get pods -n kube-system -l k8s-app=cilium --no-headers 2>/dev/null \
        | awk '$3 != "Running" { print }' | wc -l | tr -d ' ')"
      if [[ "${not_ready:-0}" -gt 0 ]]; then
        need_reset=true
      fi
    fi

    if [[ "$need_reset" != "true" ]]; then
      exit 0
    fi

    helm uninstall cilium -n kube-system --wait --timeout 5m 2>/dev/null || true
    kubectl delete pod -n kube-system -l k8s-app=cilium --force --grace-period=0 2>/dev/null || true
    kubectl delete pod -n kube-system -l name=cilium-operator --force --grace-period=0 2>/dev/null || true

    if helm status cilium -n kube-system >/dev/null 2>&1; then
      status="$(helm status cilium -n kube-system -o json | jq -r '.info.status')"
      case "$status" in
        pending-install|pending-upgrade|pending-rollback|failed|uninstalling)
          kubectl delete secret -n kube-system -l owner=helm,name=cilium --ignore-not-found || true
          ;;
      esac
    fi
  args:
    executable: /bin/bash
  changed_when: false
  failed_when: false

- name: Install Cilium CNI
  kubernetes.core.helm:
    name: cilium
    chart_ref: cilium/cilium
    release_namespace: kube-system
    create_namespace: true
    values:
      kubeProxyReplacement: true
      k8sServiceHost: "{{ hostvars[groups['k3s_server'][0]]['internal_ip'] | default(k3s_api_internal) }}"
      k8sServicePort: 6443
    wait: true
    wait_timeout: 15m0s

- name: Wait for Cilium pods Ready
  ansible.builtin.command: k3s kubectl -n kube-system wait --for=condition=Ready pod -l k8s-app=cilium --timeout=300s
  changed_when: false
  failed_when: false

- name: Install Longhorn storage
  kubernetes.core.helm:
    name: longhorn
    chart_ref: longhorn/longhorn
    release_namespace: longhorn-system
    create_namespace: true

- name: Install Traefik ingress
  kubernetes.core.helm:
    name: traefik
    chart_ref: traefik/traefik
    release_namespace: traefik
    create_namespace: true
    values:
      ports:
        web:
          nodePort: 30080
        websecure:
          nodePort: 30443

- name: Clean Argo CD hook jobs from prior failed runs
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
    kubectl delete jobs -n argocd \
      -l app.kubernetes.io/component=redis-secret-init \
      --ignore-not-found --wait=false || true
  args:
    executable: /bin/bash
  changed_when: false
  failed_when: false

- name: Clear stuck Argo CD Helm release from prior failed runs
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
    if helm status argocd -n argocd >/dev/null 2>&1; then
      status="$(helm status argocd -n argocd -o json | jq -r '.info.status')"
      case "$status" in
        pending-install|pending-upgrade|pending-rollback|failed)
          helm uninstall argocd -n argocd --wait --timeout 5m || true
          ;;
      esac
    fi
  args:
    executable: /bin/bash
  changed_when: false
  failed_when: false

- name: Prepare Argo CD namespace and prerequisites
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../includes/argocd-prereqs.yml"

- name: Build Argo CD Helm values
  ansible.builtin.set_fact:
    argocd_helm_values: >-
      {{
        lookup('file', playbook_dir + '/../../gitops/argocd/primary/values.yaml') | from_yaml
        | combine({'crds': {'install': argocd_crds_exist.rc != 0}}, recursive=True)
      }}

- name: Install Argo CD
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../includes/argocd-helm-install.yml"

- name: Detect whether Velero backup target is configured
  ansible.builtin.set_fact:
    velero_configured: >-
      {{
        velero_bucket is defined
        and velero_bucket | length > 0
        and velero_bucket != 'CHANGE_ME'
        and velero_access_key is defined
        and velero_access_key | length > 0
        and velero_access_key != 'CHANGE_ME'
        and velero_secret_key is defined
        and velero_secret_key | length > 0
        and velero_secret_key != 'CHANGE_ME'
      }}

- name: Skip Velero until backup bucket is configured (Phase 2)
  ansible.builtin.debug:
    msg: Skipping Velero install — set velero_bucket and credentials via cloud-services meta or -e extra vars.
  when: not velero_configured

- name: Install kube-prometheus-stack
  kubernetes.core.helm:
    name: kube-prometheus-stack
    chart_ref: prometheus-community/kube-prometheus-stack
    release_namespace: monitoring
    create_namespace: true
    values:
      grafana:
        adminPassword: changeme

- name: Install Velero (AWS S3)
  kubernetes.core.helm:
    name: velero
    chart_ref: vmware-tanzu/velero
    release_namespace: velero
    create_namespace: true
    values:
      snapshotsEnabled: false
      configuration:
        backupStorageLocation:
          - name: default
            provider: aws
            bucket: "{{ velero_bucket }}"
            config:
              region: "{{ velero_region | default('us-east-1') }}"
      credentials:
        useSecret: true
        secretContents:
          cloud: |
            [default]
            aws_access_key_id={{ velero_access_key }}
            aws_secret_access_key={{ velero_secret_key }}
  when:
    - velero_configured
    - velero_provider | default('aws') == 'aws'

- name: Install Velero (GCS via S3-compatible API)
  kubernetes.core.helm:
    name: velero
    chart_ref: vmware-tanzu/velero
    release_namespace: velero
    create_namespace: true
    values:
      snapshotsEnabled: false
      configuration:
        backupStorageLocation:
          - name: default
            provider: aws
            bucket: "{{ velero_bucket }}"
            config:
              region: "{{ velero_region | default('auto') }}"
              s3ForcePathStyle: "true"
              s3Url: https://storage.googleapis.com
      credentials:
        useSecret: true
        secretContents:
          cloud: |
            [default]
            aws_access_key_id={{ velero_access_key }}
            aws_secret_access_key={{ velero_secret_key }}
  when:
    - velero_configured
    - velero_provider | default('aws') == 'gcp'
