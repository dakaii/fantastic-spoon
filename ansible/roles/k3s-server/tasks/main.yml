---
- name: Install first k3s server (cluster init)
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
      INSTALL_K3S_VERSION="{{ k3s_version }}" \
      INSTALL_K3S_EXEC="server \
        --cluster-init \
        --disable traefik \
        --disable servicelb \
        --write-kubeconfig-mode 644 \
        --tls-san {{ ansible_host }}" \
      sh -
  args:
    creates: /usr/local/bin/k3s
  when:
    - inventory_hostname == groups['k3s_server'][0]
    - groups['k3s_server'] | length > 1

- name: Install additional k3s servers (join HA)
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
      INSTALL_K3S_VERSION="{{ k3s_version }}" \
      K3S_URL="https://{{ hostvars[groups['k3s_server'][0]]['ansible_host'] }}:6443" \
      K3S_TOKEN="{{ hostvars[groups['k3s_server'][0]]['k3s_node_token'] }}" \
      INSTALL_K3S_EXEC="server \
        --disable traefik \
        --disable servicelb \
        --write-kubeconfig-mode 644 \
        --tls-san {{ ansible_host }}" \
      sh -
  args:
    creates: /usr/local/bin/k3s
  when:
    - inventory_hostname != groups['k3s_server'][0]
    - groups['k3s_server'] | length > 1

- name: Install single k3s server (non-HA)
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
      INSTALL_K3S_VERSION="{{ k3s_version }}" \
      INSTALL_K3S_EXEC="server \
        --disable traefik \
        --disable servicelb \
        --write-kubeconfig-mode 644 \
        --tls-san {{ ansible_host }}" \
      sh -
  args:
    creates: /usr/local/bin/k3s
  when:
    - inventory_hostname == groups['k3s_server'][0]
    - groups['k3s_server'] | length == 1

- name: Wait for k3s to be ready
  ansible.builtin.command: k3s kubectl get nodes
  register: k3s_ready
  retries: 30
  delay: 10
  until: k3s_ready.rc == 0
  changed_when: false

- name: Read k3s node token from first server
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_node_token_slurp
  run_once: true
  delegate_to: "{{ groups['k3s_server'][0] }}"

- name: Share k3s node token with all hosts
  ansible.builtin.set_fact:
    k3s_node_token: "{{ hostvars[groups['k3s_server'][0]]['k3s_node_token_slurp'].content | b64decode | trim }}"
  run_once: true
