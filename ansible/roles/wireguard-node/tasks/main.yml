---
- name: Ensure WireGuard packages present
  ansible.builtin.apt:
    name:
      - wireguard
      - wireguard-tools
      - iptables
    state: present
    update_cache: true

- name: Load WireGuard kernel module
  community.general.modprobe:
    name: wireguard
    state: present
  failed_when: false

- name: Enable IPv4 forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_set: true
    state: present
    reload: true

- name: Detect primary uplink interface
  ansible.builtin.shell: |
    set -euo pipefail
    ip -4 route show default | awk '{print $5; exit}'
  register: wg_uplink
  changed_when: false

- name: Fail if WireGuard keys were not provided
  ansible.builtin.assert:
    that:
      - wg_server_private_key is defined
      - wg_server_private_key | length > 0
      - wg_client_public_key is defined
      - wg_client_public_key | length > 0
    fail_msg: >-
      Missing wg_server_private_key / wg_client_public_key.
      Run ./scripts/vpn-bootstrap.sh (or pass -e from vpn-clients/).

- name: Write WireGuard interface config
  ansible.builtin.template:
    src: wg0.conf.j2
    dest: /etc/wireguard/wg0.conf
    owner: root
    group: root
    mode: "0600"
  notify: Restart WireGuard

- name: Enable and start wg-quick@wg0
  ansible.builtin.systemd:
    name: wg-quick@wg0
    enabled: true
    state: started

- name: Install VPN Prometheus exporters
  ansible.builtin.include_tasks: exporters.yml
  when: vpn_metrics_enabled | bool
