---
- name: Ensure WireGuard packages present
  ansible.builtin.apt:
    name:
      - wireguard
      - wireguard-tools
      - iptables
    state: present
    update_cache: true

- name: Load WireGuard kernel module
  community.general.modprobe:
    name: wireguard
    state: present
  failed_when: false

- name: Enable IPv4 forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_set: true
    state: present
    reload: true

- name: Detect primary uplink interface
  ansible.builtin.shell: ip -4 route show default | awk '{print $5; exit}'
  args:
    executable: /bin/bash
  register: wg_uplink
  changed_when: false
  failed_when: wg_uplink.rc != 0 or wg_uplink.stdout | trim | length == 0

- name: Fail if WireGuard keys / peers were not provided
  ansible.builtin.assert:
    that:
      - wg_server_private_key is defined
      - wg_server_private_key | length > 0
      - >
          (wg_peers is defined and wg_peers | length > 0)
          or
          (wg_client_public_key is defined and wg_client_public_key | length > 0)
    fail_msg: >-
      Provide wg_peers (multi-peer) via ./scripts/vpn-apply-peers.sh,
      or legacy wg_client_public_key. Run ./scripts/vpn-bootstrap.sh first.

- name: Write WireGuard interface config
  ansible.builtin.template:
    src: wg0.conf.j2
    dest: /etc/wireguard/wg0.conf
    owner: root
    group: root
    mode: "0600"
  notify: Restart WireGuard

- name: Enable and start wg-quick@wg0
  ansible.builtin.systemd:
    name: wg-quick@wg0
    enabled: true
    state: started

- name: Install VPN Prometheus exporters
  ansible.builtin.include_tasks: exporters.yml
  when: vpn_metrics_enabled | bool
