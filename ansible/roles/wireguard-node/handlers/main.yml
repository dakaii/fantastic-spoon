---
- name: Restart WireGuard
  ansible.builtin.systemd:
    name: wg-quick@wg0
    state: restarted

- name: Restart node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    state: restarted
    daemon_reload: true

- name: Restart wireguard metrics timer
  ansible.builtin.systemd:
    name: wireguard-textfile-metrics.timer
    state: restarted
    daemon_reload: true
