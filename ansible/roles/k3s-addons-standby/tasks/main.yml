---
- name: Configure Helm
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../includes/helm-prereqs.yml"
  vars:
    helm_repos:
      - { name: traefik, url: "https://traefik.github.io/charts" }
      - { name: argo, url: "https://argoproj.github.io/argo-helm" }
      - { name: vmware-tanzu, url: "https://vmware-tanzu.github.io/helm-charts" }

- name: Wait for Kubernetes nodes Ready
  ansible.builtin.command: k3s kubectl wait --for=condition=Ready nodes --all --timeout=300s
  changed_when: false

- name: Install Traefik ingress
  kubernetes.core.helm:
    name: traefik
    chart_ref: traefik/traefik
    release_namespace: traefik
    create_namespace: true
    values:
      ports:
        web:
          nodePort: 30080
        websecure:
          nodePort: 30443

- name: Clear stuck Argo CD Helm release from prior failed runs
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../includes/argocd-helm-cleanup.yml"

- name: Prepare Argo CD namespace and prerequisites
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../includes/argocd-prereqs.yml"

- name: Build Argo CD Helm values
  ansible.builtin.set_fact:
    argocd_helm_values: >-
      {{
        lookup('file', playbook_dir + '/../../gitops/argocd/standby/values.yaml') | from_yaml
        | combine({'crds': {'install': argocd_crds_exist.rc != 0}}, recursive=True)
      }}

- name: Install Argo CD on standby
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../includes/argocd-helm-install.yml"

- name: Detect whether Velero backup target is configured
  ansible.builtin.set_fact:
    velero_configured: >-
      {{
        velero_bucket is defined
        and velero_bucket | length > 0
        and velero_bucket != 'CHANGE_ME'
        and velero_access_key is defined
        and velero_access_key | length > 0
        and velero_access_key != 'CHANGE_ME'
        and velero_secret_key is defined
        and velero_secret_key | length > 0
        and velero_secret_key != 'CHANGE_ME'
      }}

- name: Skip Velero until backup bucket is configured
  ansible.builtin.debug:
    msg: Skipping Velero install — set velero_bucket and credentials via cloud-services meta or -e extra vars.
  when: not velero_configured

- name: Install Velero on standby (AWS S3)
  kubernetes.core.helm:
    name: velero
    chart_ref: vmware-tanzu/velero
    release_namespace: velero
    create_namespace: true
    values:
      snapshotsEnabled: false
      initContainers:
        - name: velero-plugin-for-aws
          image: "{{ velero_aws_plugin_image | default('velero/velero-plugin-for-aws:v1.14.0') }}"
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - mountPath: /target
              name: plugins
      configuration:
        backupStorageLocation:
          - name: default
            provider: aws
            bucket: "{{ velero_bucket }}"
            config:
              region: "{{ velero_region | default('us-east-1') }}"
      credentials:
        useSecret: true
        secretContents:
          cloud: |
            [default]
            aws_access_key_id={{ velero_access_key }}
            aws_secret_access_key={{ velero_secret_key }}
  when:
    - velero_configured
    - velero_provider | default('aws') == 'aws'

- name: Install Velero on standby (GCS via S3-compatible API)
  kubernetes.core.helm:
    name: velero
    chart_ref: vmware-tanzu/velero
    release_namespace: velero
    create_namespace: true
    values:
      snapshotsEnabled: false
      initContainers:
        - name: velero-plugin-for-aws
          image: "{{ velero_aws_plugin_image | default('velero/velero-plugin-for-aws:v1.14.0') }}"
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - mountPath: /target
              name: plugins
      configuration:
        backupStorageLocation:
          - name: default
            provider: aws
            bucket: "{{ velero_bucket }}"
            config:
              region: "{{ velero_region | default('auto') }}"
              s3ForcePathStyle: "true"
              s3Url: https://storage.googleapis.com
              checksumAlgorithm: ""
      credentials:
        useSecret: true
        secretContents:
          cloud: |
            [default]
            aws_access_key_id={{ velero_access_key }}
            aws_secret_access_key={{ velero_secret_key }}
  when:
    - velero_configured
    - velero_provider | default('aws') == 'gcp'
