---
- name: Install Helm
  ansible.builtin.shell: |
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm

- name: Add Helm repos
  kubernetes.core.helm_repository:
    name: "{{ item.name }}"
    repo_url: "{{ item.url }}"
  loop:
    - { name: traefik, url: "https://traefik.github.io/charts" }
    - { name: argo, url: "https://argoproj.github.io/argo-helm" }
    - { name: vmware-tanzu, url: "https://vmware-tanzu.github.io/helm-charts" }

- name: Install Traefik ingress
  kubernetes.core.helm:
    name: traefik
    chart_ref: traefik/traefik
    release_namespace: traefik
    create_namespace: true
    values:
      ports:
        web:
          nodePort: 30080
        websecure:
          nodePort: 30443

- name: Install Argo CD on standby
  kubernetes.core.helm:
    name: argocd
    chart_ref: argo/argo-cd
    release_namespace: argocd
    create_namespace: true
    values_files:
      - "{{ playbook_dir }}/../../gitops/argocd/standby/values.yaml"

- name: Install Velero on standby (AWS S3)
  kubernetes.core.helm:
    name: velero
    chart_ref: vmware-tanzu/velero
    release_namespace: velero
    create_namespace: true
    values:
      configuration:
        backupStorageLocation:
          - name: default
            provider: aws
            bucket: "{{ velero_bucket }}"
            config:
              region: "{{ velero_region | default('us-east-1') }}"
      credentials:
        useSecret: true
        secretContents:
          cloud: |
            [default]
            aws_access_key_id={{ velero_access_key }}
            aws_secret_access_key={{ velero_secret_key }}
  when:
    - velero_bucket is defined and velero_bucket != ""
    - velero_provider | default('aws') == 'aws'

- name: Install Velero on standby (GCS via S3-compatible API)
  kubernetes.core.helm:
    name: velero
    chart_ref: vmware-tanzu/velero
    release_namespace: velero
    create_namespace: true
    values:
      configuration:
        backupStorageLocation:
          - name: default
            provider: aws
            bucket: "{{ velero_bucket }}"
            config:
              region: "{{ velero_region | default('auto') }}"
              s3ForcePathStyle: "true"
              s3Url: https://storage.googleapis.com
      credentials:
        useSecret: true
        secretContents:
          cloud: |
            [default]
            aws_access_key_id={{ velero_access_key }}
            aws_secret_access_key={{ velero_secret_key }}
  when:
    - velero_bucket is defined and velero_bucket != ""
    - velero_provider | default('aws') == 'gcp'
