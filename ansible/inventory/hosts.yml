# Generated from Terraform outputs — update ansible_host IPs after first boot
# Run: virsh domifaddr hybrid-k8s-node-N to get IPs

all:
  vars:
    ansible_user: ubuntu
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
    k3s_version: "v1.29.5+k3s1"
    k3s_token: ""  # Populated after first server bootstrap

  children:
    k3s_server:
      hosts:
        hybrid-k8s-node-1:
          ansible_host: 192.168.122.10
          node_role: server
        hybrid-k8s-node-2:
          ansible_host: 192.168.122.11
          node_role: server
        hybrid-k8s-node-3:
          ansible_host: 192.168.122.12
          node_role: server

    k3s_agent:
      hosts:
        hybrid-k8s-node-4:
          ansible_host: 192.168.122.13
          node_role: agent
        hybrid-k8s-node-5:
          ansible_host: 192.168.122.14
          node_role: agent
