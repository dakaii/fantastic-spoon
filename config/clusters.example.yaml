# Cluster topology — copy to clusters.yaml and edit
#
# Switch provisioners here without changing Ansible or GitOps.
# Supported provisioners: gcp-compute, aws-ec2, libvirt, on-prem

primary:
  provisioner: gcp-compute
  terraform_dir: primary-cluster-gcp
  inventory: ansible/inventory/primary-hosts.yml
  profile: primary

standby:
  provisioner: gcp-compute
  terraform_dir: cloud-services-gcp
  inventory: ansible/inventory/standby-hosts.yml
  profile: standby

# --- Example: on-prem primary + GCP standby (hybrid) ---
#
# primary:
#   provisioner: on-prem
#   inventory: ansible/inventory/on-prem.primary.yml
#   profile: primary
#
# standby:
#   provisioner: gcp-compute
#   terraform_dir: cloud-services-gcp
#   inventory: ansible/inventory/standby-hosts.yml
#   profile: standby

