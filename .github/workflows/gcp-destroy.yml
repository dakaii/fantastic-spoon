# Destroy all Terraform-managed resources in the GCP project
# Does NOT delete the GCP project unless delete_project input is true
# Prefer: GCP_PROJECT=... ./scripts/gcp-teardown.sh --gha --watch (pushes local state first)
# Requires GitHub Environment "gcp-destroy" (Settings → Environments → Required reviewers)
# See docs/GITHUB-ACTIONS-SETUP.md

name: GCP Destroy

on:
  workflow_dispatch:
    inputs:
      delete_project:
        description: Also delete the entire GCP project (irreversible)
        required: false
        default: false
        type: boolean

jobs:
  destroy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: gcp-destroy
    steps:
      - name: Check required secrets
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          missing=0
          [[ -n "$GCP_PROJECT" ]] || { echo "::error::Missing secret GCP_PROJECT"; missing=1; }
          [[ -n "$GCP_SA_KEY" ]] || { echo "::error::Missing secret GCP_SA_KEY"; missing=1; }
          if [[ $missing -ne 0 ]]; then
            echo "See docs/GITHUB-ACTIONS-SETUP.md"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Write terraform.tfvars for destroy
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
          ADMIN_CIDR: ${{ secrets.ADMIN_CIDR }}
        run: |
          chmod +x scripts/*.sh
          export FORCE_TFVARS=1
          export SKIP_AUTH=1
          SSH_PUBLIC_KEY="${SSH_PUBLIC_KEY:-ssh-ed25519 placeholder}"
          # Placeholder only so init can write tfvars — never invent world-open SSH
          ADMIN_CIDR="${ADMIN_CIDR:-127.0.0.1/32}"
          ./scripts/gcp-deploy.sh init

      - name: Pre-check (VMs vs Terraform state)
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
        run: |
          chmod +x scripts/*.sh
          ./scripts/gcp-destroy-verify.sh pre

      - name: Destroy resources
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          DELETE_PROJECT: ${{ inputs.delete_project == true && '1' || '0' }}
        run: |
          chmod +x scripts/*.sh
          ./scripts/gcp-destroy-all.sh

      - name: Post-check (no instances left)
        if: ${{ inputs.delete_project != true }}
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
        run: |
          chmod +x scripts/*.sh
          ./scripts/gcp-destroy-verify.sh post
