# Destroy VPN gateway only (vpn-gateways-gcp). Primary/standby clusters are untouched.
# See docs/VPN-RUNBOOK.md

name: GCP VPN Destroy

on:
  workflow_dispatch:
    inputs:
      city:
        description: City label (informational; V1 destroys the vpn-gateways-gcp stack)
        required: false
        default: "us"
        type: string

jobs:
  destroy-vpn:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check required secrets
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          missing=0
          [[ -n "$GCP_PROJECT" ]] || { echo "::error::Missing secret GCP_PROJECT"; missing=1; }
          [[ -n "$GCP_SA_KEY" ]] || { echo "::error::Missing secret GCP_SA_KEY"; missing=1; }
          if [[ $missing -ne 0 ]]; then
            echo "See docs/GITHUB-ACTIONS-SETUP.md"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Destroy VPN gateway
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
          ADMIN_CIDR: ${{ secrets.ADMIN_CIDR }}
        run: |
          chmod +x scripts/*.sh
          export SSH_PUBLIC_KEY="${SSH_PUBLIC_KEY:-ssh-ed25519 placeholder}"
          export ADMIN_CIDR="${ADMIN_CIDR:-0.0.0.0/0}"
          ./scripts/gcp-vpn-destroy-ci.sh
