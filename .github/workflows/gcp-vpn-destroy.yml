# Destroy VPN gateway only (vpn-gateways-gcp). Primary/standby clusters are untouched.
# Requires GitHub Environment "gcp-destroy" (same approval gate as full destroy).
# See docs/VPN-RUNBOOK.md and docs/GITHUB-ACTIONS-SETUP.md

name: GCP VPN Destroy

on:
  workflow_dispatch:
    inputs:
      city:
        description: Which city gateway to destroy (us or hk). Other cities untouched.
        required: false
        default: "us"
        type: choice
        options:
          - us
          - hk

jobs:
  destroy-vpn:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: gcp-destroy
    steps:
      - name: Check required secrets
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          missing=0
          [[ -n "$GCP_PROJECT" ]] || { echo "::error::Missing secret GCP_PROJECT"; missing=1; }
          [[ -n "$GCP_SA_KEY" ]] || { echo "::error::Missing secret GCP_SA_KEY"; missing=1; }
          if [[ $missing -ne 0 ]]; then
            echo "See docs/GITHUB-ACTIONS-SETUP.md"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Destroy VPN gateway
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
          ADMIN_CIDR: ${{ secrets.ADMIN_CIDR }}
          VPN_CITY: ${{ inputs.city }}
        run: |
          chmod +x scripts/*.sh
          export SSH_PUBLIC_KEY="${SSH_PUBLIC_KEY:-ssh-ed25519 placeholder}"
          # Placeholder only — never invent world-open SSH for destroy tfvars
          export ADMIN_CIDR="${ADMIN_CIDR:-127.0.0.1/32}"
          ./scripts/gcp-vpn-destroy-ci.sh
