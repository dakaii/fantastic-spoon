# VPN V1.1: provision WireGuard gateway + multi-peer-capable host WG + laptop client profile
# Additive — does not modify primary/standby clusters.
# Download the artifact .conf and import into the official WireGuard app.
# See docs/VPN-RUNBOOK.md and docs/GITHUB-ACTIONS-SETUP.md

name: GCP VPN

on:
  workflow_dispatch:
    inputs:
      city:
        description: City/profile name (single-city V1 default us)
        required: false
        default: "us"
        type: string

jobs:
  vpn:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check required secrets
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
          ADMIN_CIDR: ${{ secrets.ADMIN_CIDR }}
        run: |
          missing=0
          [[ -n "$GCP_PROJECT" ]] || { echo "::error::Missing secret GCP_PROJECT"; missing=1; }
          [[ -n "$GCP_SA_KEY" ]] || { echo "::error::Missing secret GCP_SA_KEY"; missing=1; }
          [[ -n "$SSH_PRIVATE_KEY" ]] || { echo "::error::Missing secret SSH_PRIVATE_KEY"; missing=1; }
          [[ -n "$SSH_PUBLIC_KEY" ]] || { echo "::error::Missing secret SSH_PUBLIC_KEY"; missing=1; }
          [[ -n "$ADMIN_CIDR" ]] || { echo "::error::Missing secret ADMIN_CIDR"; missing=1; }
          if [[ $missing -ne 0 ]]; then
            echo "See docs/GITHUB-ACTIONS-SETUP.md — use --full SA"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Install Ansible, jq, wireguard-tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq wireguard-tools
          pip install ansible
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Configure SSH key for Ansible
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Provision VPN gateway + WireGuard
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
          ADMIN_CIDR: ${{ secrets.ADMIN_CIDR }}
          VPN_CITY: ${{ inputs.city }}
        run: |
          chmod +x scripts/*.sh
          ./scripts/gcp-vpn-ci.sh

      - name: Upload WireGuard client config artifact
        uses: actions/upload-artifact@v4
        with:
          name: wireguard-client-${{ inputs.city }}
          path: tmp/vpn-artifact/
          if-no-files-found: error
          retention-days: 7
