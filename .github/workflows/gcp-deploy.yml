# Manual GCP deploy — requires GitHub secrets (see docs/GCP-DEPLOY.md)
#
# Secrets required:
#   GCP_PROJECT      — e.g. hybrid-k8s-dev
#   GCP_SA_KEY       — service account JSON (prefer Workload Identity for production)
#   SSH_PUBLIC_KEY   — contents of id_ed25519.pub
#   ADMIN_CIDR       — your IP/32
#
# Recommended: use ./scripts/gcp-deploy.sh locally instead until infra is stable.

name: GCP Deploy

on:
  workflow_dispatch:
    inputs:
      step:
        description: 'Deploy step'
        required: true
        default: 'infra'
        type: choice
        options:
          - infra
          - apps

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ secrets.GCP_PROJECT != '' && secrets.GCP_SA_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Install Ansible
        run: pip install ansible

      - name: Create local terraform.tfvars
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
          ADMIN_CIDR: ${{ secrets.ADMIN_CIDR }}
        run: |
          chmod +x scripts/gcp-deploy.sh
          SKIP_AUTH=1 ./scripts/gcp-deploy.sh init

      - name: Deploy infrastructure
        if: inputs.step == 'infra'
        env:
          SKIP_AUTH: 1
        run: |
          chmod +x scripts/*.sh
          ./scripts/gcp-deploy.sh infra

      - name: Deploy apps
        if: inputs.step == 'apps'
        env:
          SKIP_AUTH: 1
        run: |
          chmod +x scripts/*.sh
          ./scripts/gcp-deploy.sh apps

  missing-secrets:
    runs-on: ubuntu-latest
    if: ${{ secrets.GCP_PROJECT == '' || secrets.GCP_SA_KEY == '' }}
    steps:
      - name: Secrets not configured
        run: |
          echo "::warning::GCP deploy secrets not set. Use ./scripts/gcp-deploy.sh locally."
          echo "See docs/GCP-DEPLOY.md for setup instructions."
          exit 1
