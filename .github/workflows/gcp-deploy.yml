# Manual GCP deploy — EXPERIMENTAL (see docs/GCP-DEPLOY.md, docs/GITHUB-ACTIONS-SETUP.md)
#
# Limitations:
#   - Requires GCP service account JSON in GitHub secrets
#   - Requires SSH_PRIVATE_KEY secret matching terraform.tfvars ssh_public_key
#   - VMs must allow SSH from GitHub Actions IP ranges OR use a self-hosted runner
#   - Recommended: use ./scripts/gcp-deploy.sh locally instead
#
# Secrets required:
#   GCP_PROJECT, GCP_SA_KEY, SSH_PUBLIC_KEY, SSH_PRIVATE_KEY, ADMIN_CIDR

name: GCP Deploy (Experimental)

on:
  workflow_dispatch:
    inputs:
      step:
        description: 'Deploy step'
        required: true
        default: 'infra'
        type: choice
        options:
          - infra

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          missing=0
          [[ -n "$GCP_PROJECT" ]] || { echo "::error::Missing secret GCP_PROJECT"; missing=1; }
          [[ -n "$GCP_SA_KEY" ]] || { echo "::error::Missing secret GCP_SA_KEY"; missing=1; }
          [[ -n "$SSH_PRIVATE_KEY" ]] || { echo "::error::Missing secret SSH_PRIVATE_KEY"; missing=1; }
          if [[ $missing -ne 0 ]]; then
            echo "Use ./scripts/gcp-deploy.sh locally — see docs/GCP-DEPLOY.md"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Install Ansible and tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq
          pip install ansible
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Configure SSH key for Ansible
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Create local terraform.tfvars
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
          ADMIN_CIDR: ${{ secrets.ADMIN_CIDR }}
        run: |
          chmod +x scripts/gcp-deploy.sh
          SKIP_AUTH=1 ./scripts/gcp-deploy.sh init

      - name: Deploy infrastructure
        if: inputs.step == 'infra'
        env:
          SKIP_AUTH: 1
        run: |
          chmod +x scripts/*.sh
          ./scripts/gcp-deploy.sh infra
