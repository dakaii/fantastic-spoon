# Phase 2: standby GCE + GCS backups + bootstrap standby + Velero on primary
# No local gcloud login — uses GCP_SA_KEY from GitHub Secrets.
# See docs/GITHUB-ACTIONS-SETUP.md

name: GCP Phase 2

on:
  workflow_dispatch:
    inputs:
      skip_velero:
        description: Skip Velero install on primary
        required: false
        default: false
        type: boolean

jobs:
  phase2:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check required secrets
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
          ADMIN_CIDR: ${{ secrets.ADMIN_CIDR }}
        run: |
          missing=0
          [[ -n "$GCP_PROJECT" ]] || { echo "::error::Missing secret GCP_PROJECT"; missing=1; }
          [[ -n "$GCP_SA_KEY" ]] || { echo "::error::Missing secret GCP_SA_KEY"; missing=1; }
          [[ -n "$SSH_PRIVATE_KEY" ]] || { echo "::error::Missing secret SSH_PRIVATE_KEY"; missing=1; }
          [[ -n "$SSH_PUBLIC_KEY" ]] || { echo "::error::Missing secret SSH_PUBLIC_KEY"; missing=1; }
          [[ -n "$ADMIN_CIDR" ]] || { echo "::error::Missing secret ADMIN_CIDR (use 0.0.0.0/0 for GitHub runners)"; missing=1; }
          if [[ $missing -ne 0 ]]; then
            echo "See docs/GITHUB-ACTIONS-SETUP.md — Phase 2 needs --full SA roles (Compute Admin + Storage Admin)"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Install Ansible, jq, and collections
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq
          pip install ansible
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Configure SSH key for Ansible
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Phase 2 (standby infra + bootstrap + Velero)
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
          ADMIN_CIDR: ${{ secrets.ADMIN_CIDR }}
          SKIP_VELERO: ${{ inputs.skip_velero == true && '1' || '' }}
        run: |
          chmod +x scripts/*.sh
          ./scripts/gcp-phase2-ci.sh
