# Prometheus alert rules for cluster health and failover triggers.
# Requires kube-prometheus-stack (installed by Ansible k3s-addons role).
#
# Labels must match the Prometheus Operator ruleSelector:
#   release: kube-prometheus-stack
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: hybrid-k8s-cluster-health
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
    app.kubernetes.io/part-of: hybrid-k8s-platform
spec:
  groups:
    - name: hybrid-k8s.cluster-health
      interval: 30s
      rules:
        - alert: KubeAPIDown
          expr: up{job="apiserver"} == 0
          for: 2m
          labels:
            severity: critical
            component: control-plane
          annotations:
            summary: "Kubernetes API server is unreachable"
            description: "The API server has been down for more than 2 minutes. Consider triggering failover if this persists."
            runbook_url: "https://github.com/dakaii/fantastic-spoon/blob/main/docs/MONITORING.md#kubeapidown"

        - alert: KubeNodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 5m
          labels:
            severity: warning
            component: node
          annotations:
            summary: "Node {{ $labels.node }} is NotReady"
            description: "Node has been NotReady for more than 5 minutes."

        - alert: KubeMultipleNodesDown
          expr: count(kube_node_status_condition{condition="Ready",status="true"} == 0) > 1
          for: 3m
          labels:
            severity: critical
            component: node
          annotations:
            summary: "Multiple nodes are down ({{ $value }} nodes NotReady)"
            description: "More than one node is NotReady. Cluster may be degraded — evaluate failover."

        - alert: KubePodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total[15m]) > 3
          for: 5m
          labels:
            severity: warning
            component: workload
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
            description: "Container {{ $labels.container }} has restarted more than 3 times in 15 minutes."

        - alert: KubeDeploymentReplicasMismatch
          expr: |
            kube_deployment_spec_replicas != kube_deployment_status_replicas_available
          for: 10m
          labels:
            severity: warning
            component: workload
          annotations:
            summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} replica mismatch"
            description: "Available replicas do not match desired replicas for 10+ minutes."

        - alert: KubePersistentVolumeFillingUp
          expr: |
            (
              kubelet_volume_stats_available_bytes
              / kubelet_volume_stats_capacity_bytes
            ) < 0.15
          for: 10m
          labels:
            severity: warning
            component: storage
          annotations:
            summary: "PV {{ $labels.persistentvolumeclaim }} in {{ $labels.namespace }} is >85% full"
            description: "Less than 15% storage remaining on persistent volume."

        - alert: NodeMemoryPressure
          expr: |
            kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
          for: 5m
          labels:
            severity: warning
            component: node
          annotations:
            summary: "Node {{ $labels.node }} is under memory pressure"
            description: "Node reports MemoryPressure — workloads may be evicted."

        - alert: NodeDiskPressure
          expr: |
            kube_node_status_condition{condition="DiskPressure",status="true"} == 1
          for: 5m
          labels:
            severity: warning
            component: node
          annotations:
            summary: "Node {{ $labels.node }} is under disk pressure"
            description: "Node reports DiskPressure — check Longhorn and root volume usage."
