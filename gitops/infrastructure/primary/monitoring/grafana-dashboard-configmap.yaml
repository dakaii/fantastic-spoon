apiVersion: v1
kind: ConfigMap
metadata:
  name: hybrid-k8s-grafana-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    release: kube-prometheus-stack
    app.kubernetes.io/part-of: hybrid-k8s-platform
  annotations:
    grafana_folder: "Hybrid K8s Platform"
data:
  hybrid-k8s-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [
                { "options": { "0": { "color": "red", "text": "DOWN" }, "1": { "color": "green", "text": "UP" } }, "type": "value" }
              ],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] }
            }
          },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "id": 1,
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "title": "API Server",
          "type": "stat",
          "targets": [{ "expr": "up{job=\"apiserver\"}", "legendFormat": "apiserver" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }
            }
          },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "id": 2,
          "options": { "colorMode": "value", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "title": "Nodes Ready",
          "type": "stat",
          "targets": [{ "expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"})", "legendFormat": "ready" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }
            }
          },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "id": 3,
          "options": { "colorMode": "value", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "title": "Running Pods",
          "type": "stat",
          "targets": [{ "expr": "sum(kube_pod_status_phase{phase=\"Running\"})", "legendFormat": "pods" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }
            }
          },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "id": 4,
          "options": { "colorMode": "value", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "title": "Argo CD Apps (Healthy)",
          "type": "stat",
          "targets": [{ "expr": "count(argocd_app_info{health_status=\"Healthy\"})", "legendFormat": "healthy" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1 } },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "id": 5,
          "options": { "legend": { "displayMode": "list" }, "tooltip": { "mode": "multi" } },
          "title": "Node CPU Usage",
          "type": "timeseries",
          "targets": [{ "expr": "1 - avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))", "legendFormat": "{{ instance }}" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1 } },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "id": 6,
          "options": { "legend": { "displayMode": "list" }, "tooltip": { "mode": "multi" } },
          "title": "Node Memory Usage",
          "type": "timeseries",
          "targets": [{ "expr": "1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)", "legendFormat": "{{ instance }}" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "id": 7,
          "options": { "legend": { "displayMode": "table" }, "tooltip": { "mode": "multi" } },
          "title": "Pod Restarts (15m)",
          "type": "timeseries",
          "targets": [{ "expr": "sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total[15m])) > 0", "legendFormat": "{{ namespace }}/{{ pod }}" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "id": 8,
          "options": { "legend": { "displayMode": "list" }, "tooltip": { "mode": "multi" } },
          "title": "Argo CD Sync Status",
          "type": "timeseries",
          "targets": [{ "expr": "count by (sync_status) (argocd_app_info)", "legendFormat": "{{ sync_status }}" }]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["hybrid-k8s", "kubernetes", "failover"],
      "time": { "from": "now-1h", "to": "now" },
      "title": "Hybrid K8s Platform Overview",
      "uid": "hybrid-k8s-overview",
      "version": 1
    }
