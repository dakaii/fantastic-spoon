# Example Alertmanager config overlay for kube-prometheus-stack Helm values.
# Do NOT apply directly — merge into your Helm values or GitOps Helm chart config.
#
# Install with:
#   helm upgrade kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#     -n monitoring -f gitops/infrastructure/primary/monitoring/helm-values-alertmanager.example.yaml
#
alertmanager:
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ["alertname", "cluster", "severity"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: default
      routes:
        - match:
            severity: critical
          receiver: critical
          repeat_interval: 1h
        - match:
            component: velero
          receiver: critical
    receivers:
      - name: default
        # Replace with your notification channel:
        # email_configs:
        #   - to: you@example.com
        #     from: alertmanager@yourdomain.com
        #     smarthost: smtp.example.com:587
        webhook_configs: []
      - name: critical
        # Slack example (uncomment and set webhook URL):
        # slack_configs:
        #   - api_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"
        #     channel: "#alerts"
        #     title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
        #     text: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}"
        webhook_configs: []

# Enable scraping of Argo CD and Velero metrics
prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

# Enable Grafana dashboard sidecar to pick up ConfigMaps
grafana:
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: monitoring
