# Argo CD on primary cluster — active GitOps controller.

# CRDs: Ansible sets crds.install=false when CRDs already exist (kept after helm uninstall).
crds:
  install: true
  keep: true

# Avoid flaky redis-secret-init pre-install hook; Ansible creates argocd-redis secret first.
redisSecretInit:
  enabled: false

server:
  service:
    type: NodePort
    # Traefik ingress uses 30080/30443; avoid NodePort collision.
    nodePortHttp: 32080
    nodePortHttps: 32443
  replicas: 1

configs:
  params:
    server.insecure: true

extraObjects:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: cluster-role
      namespace: argocd
    data:
      role: active
