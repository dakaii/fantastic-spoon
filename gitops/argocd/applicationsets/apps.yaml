apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: applications
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/dakaii/fantastic-spoon.git
        revision: main
        directories:
          - path: gitops/apps/*
  template:
    metadata:
      name: "{{path.basename}}"
      labels:
        app.kubernetes.io/part-of: hybrid-platform
    spec:
      project: default
      source:
        repoURL: https://github.com/dakaii/fantastic-spoon.git
        targetRevision: main
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{path.basename}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
